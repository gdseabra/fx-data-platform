# conf/spark-defaults.conf
# Project-level Spark defaults for local/dev execution.
#
# Usage:
#   SPARK_CONF_DIR=conf/ spark-submit etl/iceberg/catalog_setup.py --env dev
#
# Or export once per shell session:
#   export SPARK_CONF_DIR=$(pwd)/conf
#
# These packages are downloaded by Ivy on first run (~200MB) and cached
# in ~/.ivy2/cache. Subsequent runs are instant.

# ── Iceberg + S3A packages ────────────────────────────────────────────────────
spark.jars.packages  org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.3,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

# ── Iceberg extensions (must mirror spark_session.py) ─────────────────────────
spark.sql.extensions  org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# ── Local dev sizing ─────────────────────────────────────────────────────────
spark.sql.shuffle.partitions  4
spark.driver.memory           2g
spark.executor.memory         2g

# ── Logging ───────────────────────────────────────────────────────────────────
spark.eventLog.enabled  false
