name: Spark Tests

on:
  pull_request:
    paths:
      - 'etl/**'
      - 'tests/etl/**'

concurrency:
  group: spark-tests-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  spark-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Java 11 (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run PySpark unit tests
        env:
          PYSPARK_PYTHON: python3
          SPARK_LOCAL_IP: 127.0.0.1
        run: pytest tests/etl/ -v -m "not integration" --tb=short

      - name: Validate output schemas
        env:
          PYSPARK_PYTHON: python3
          SPARK_LOCAL_IP: 127.0.0.1
        run: pytest tests/etl/ -v -k "schema" --tb=short
