# Prometheus Configuration for FX Data Platform
# Scrapes metrics from all platform services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: 'fx-data-platform'
    environment: 'dev'

# AlertManager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'fx-alertmanager:9093'

rule_files:
  - '/etc/prometheus/alert_rules.yml'

scrape_configs:
  # ---- Prometheus self-monitoring ----
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ---- Redpanda / Kafka ----
  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: '/public_metrics'

  # ---- FastAPI Inference Service ----
  - job_name: 'inference-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['inference-service:8000']
    scrape_interval: 5s

  # ---- Apache Airflow (via Blackbox Exporter) ----
  # Airflow /health returns JSON, not Prometheus metrics format.
  # We use blackbox-exporter to probe the HTTP endpoint.
  - job_name: 'airflow'
    metrics_path: /probe
    params:
      module: [http_2xx]
      target: ['http://airflow:8080/health']
    static_configs:
      - targets: ['blackbox-exporter:9115']
        labels:
          instance: 'airflow:8080'

  # ---- MinIO ----
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']

  # ---- MLflow (via Blackbox Exporter) ----
  # MLflow /health returns plain "OK", not Prometheus metrics format.
  # We use blackbox-exporter to probe the HTTP endpoint and expose
  # probe_success=1 when MLflow responds with HTTP 2xx.
  - job_name: 'mlflow'
    metrics_path: /probe
    params:
      module: [http_2xx]
      target: ['http://mlflow:5000/health']
    static_configs:
      - targets: ['blackbox-exporter:9115']
        labels:
          instance: 'mlflow:5000'

  # ---- PostgreSQL Exporter ----
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ---- Node Exporter (host system metrics) ----
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # ---- Redpanda Connect ----
  - job_name: 'redpanda-connect'
    static_configs:
      - targets: ['redpanda-connect:4195']
    metrics_path: '/metrics'
