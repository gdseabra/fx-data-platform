# Prometheus Configuration for FX Data Platform
# Scrapes metrics from all platform services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: 'fx-data-platform'
    environment: 'dev'

# AlertManager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'fx-alertmanager:9093'

rule_files:
  - '/etc/prometheus/alert_rules.yml'

scrape_configs:
  # ---- Prometheus self-monitoring ----
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ---- Redpanda / Kafka ----
  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: '/public_metrics'

  # ---- FastAPI Inference Service ----
  - job_name: 'inference-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['inference-service:8000']
    scrape_interval: 5s

  # ---- Apache Airflow (StatsD exporter) ----
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow:8090']
    metrics_path: '/health'

  # ---- MinIO ----
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']

  # ---- MLflow ----
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
    metrics_path: '/health'

  # ---- PostgreSQL Exporter ----
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ---- Node Exporter (host system metrics) ----
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # ---- Redpanda Connect ----
  - job_name: 'redpanda-connect'
    static_configs:
      - targets: ['redpanda-connect:4195']
    metrics_path: '/metrics'
