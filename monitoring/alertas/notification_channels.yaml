# AlertManager Configuration for FX Data Platform
# Routes alerts to Slack, Email, and PagerDuty based on severity

global:
  resolve_timeout: 5m
  # Slack webhook (replace with real URL)
  slack_api_url: 'https://hooks.slack.com/services/REPLACE/WITH/REAL_WEBHOOK'
  # SMTP for email alerts
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'fx-alerts@company.com'
  smtp_auth_username: 'fx-alerts@company.com'
  smtp_auth_password: 'REPLACE_WITH_APP_PASSWORD'
  smtp_require_tls: true

# Alert templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  # Default receiver for unmatched alerts
  receiver: 'slack-data-alerts'
  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'team']
  # Wait before sending a group notification
  group_wait: 30s
  # Wait before sending updates for the same group
  group_interval: 5m
  # Wait before re-sending a resolved alert
  repeat_interval: 4h

  routes:
    # CRITICAL alerts -> PagerDuty + Slack
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - match:
        severity: critical
      receiver: 'slack-data-alerts'
      group_wait: 10s

    # WARNING alerts -> Slack + Email
    - match:
        severity: warning
      receiver: 'slack-data-alerts'
      continue: true

    - match:
        severity: warning
      receiver: 'email-data-team'
      group_wait: 1m
      repeat_interval: 8h

    # INFO alerts -> Slack only
    - match:
        severity: info
      receiver: 'slack-data-alerts'
      repeat_interval: 12h

# Receivers
receivers:
  # Slack: canal #data-alerts
  - name: 'slack-data-alerts'
    slack_configs:
      - channel: '#data-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}:rotating_light:{{ else }}:white_check_mark:{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Severity:* {{ .CommonLabels.severity }}
          *Team:* {{ .CommonLabels.team }}
          *Description:* {{ .CommonAnnotations.description }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}
          *Alerts:*
          {{ range .Alerts }}
            - {{ .Annotations.summary }}
          {{ end }}
        actions:
          - type: button
            text: 'Runbook'
            url: '{{ .CommonAnnotations.runbook_url }}'
          - type: button
            text: 'Grafana'
            url: 'http://localhost:3000'

  # Email: equipe de dados
  - name: 'email-data-team'
    email_configs:
      - to: 'data-team@company.com'
        send_resolved: true
        headers:
          Subject: '[FX Platform {{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        html: |
          <h2>{{ .CommonLabels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          {{ if .CommonAnnotations.runbook_url }}<p><a href="{{ .CommonAnnotations.runbook_url }}">Runbook</a></p>{{ end }}

  # PagerDuty: alertas criticos para equipe de plantao
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'REPLACE_WITH_PAGERDUTY_SERVICE_KEY'
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          alertname: '{{ .CommonLabels.alertname }}'
          description: '{{ .CommonAnnotations.description }}'
          team: '{{ .CommonLabels.team }}'

# Inhibition rules — suppress lower severity if critical is firing for same alert
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname']
